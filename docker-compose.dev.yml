services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: clawhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clawhub
      POSTGRES_PASSWORD: clawhub_dev
      POSTGRES_DB: clawhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawhub -d clawhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 可选：Redis for BullMQ (定时任务队列)
  redis:
    image: redis:7-alpine
    container_name: clawhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
